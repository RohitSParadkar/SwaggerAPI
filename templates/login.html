<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>API Hub — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,.4)}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
    .logo-icon{width:40px;height:40px;background:#0f172a;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
    .logo-text h1{font-size:16px;font-weight:700;color:#0f172a}
    .logo-text p{font-size:12px;color:#94a3b8;margin-top:1px}
    label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
    input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;transition:all .15s;background:#f9fafb}
    input:focus{border-color:#0f172a;background:#fff;box-shadow:0 0 0 3px rgba(15,23,42,.08)}
    .form-group{margin-bottom:1.25rem}
    .btn{width:100%;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:#0f172a;color:#fff;transition:all .15s;margin-top:.5rem}
    .btn:hover{background:#1e293b}
    .btn:disabled{opacity:.6;cursor:default}
    .err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:13px;padding:10px 12px;border-radius:8px;margin-bottom:1rem;display:none}
    .hint{font-size:12px;color:#94a3b8;text-align:center;margin-top:1.5rem;line-height:1.6}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:40px}
    .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#94a3b8;display:flex;align-items:center;justify-content:center;transition:color .15s}
    .pw-toggle:hover{color:#374151}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">
      <h1>API Hub</h1>
      <p>Centralized API Documentation</p>
    </div>
  </div>
  <div class="err" id="err"></div>
  <div class="form-group">
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Enter your username" autocomplete="username">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <div class="pw-wrap">
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
      <button type="button" class="pw-toggle" id="pw-toggle-btn" onclick="togglePassword()" tabindex="-1" aria-label="Show/hide password">
        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
  </div>
  <button class="btn" id="loginBtn" onclick="login()">Sign in</button>
  <div class="hint">Your credentials are provided by your administrator.<br>Contact admin if you need access.</div>
</div>
<script>
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

async function login(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('err');
  const btn      = document.getElementById('loginBtn');
  errEl.style.display='none';
  if(!username||!password){ errEl.textContent='Please enter username and password.'; errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    const res = await fetch('/api/auth/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if(!res.ok){ errEl.textContent=data.detail||'Login failed'; errEl.style.display='block'; return; }
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user',  JSON.stringify(data.user));
    window.location = data.user.role==='admin' ? '/admin.html' : '/entity.html';
  }catch(e){
    errEl.textContent='Server error. Is the server running?'; errEl.style.display='block';
  }finally{
    btn.disabled=false; btn.textContent='Sign in';
  }
}

function togglePassword(){
  const input = document.getElementById('password');
  const eyeOn  = document.getElementById('eye-icon');
  const eyeOff = document.getElementById('eye-off-icon');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  eyeOn.style.display  = isHidden ? 'none'  : '';
  eyeOff.style.display = isHidden ? ''      : 'none';
}
</script>
</body>
</html>
