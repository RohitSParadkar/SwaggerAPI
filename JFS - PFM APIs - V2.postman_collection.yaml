openapi: 3.0.0
info:
  title: JFS - PFM APIs - V2
  version: 1.0.0
  description: ''
servers:
  - url: https://jfspfm.fiu.uat.ignosis.ai
paths:
  /api/pfm/jfs_uat/web/initiate-consents:
    post:
      summary: Initiate API
      responses: {}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneNumber:
                  type: string
                  format: utc-millisec
                templateTypes:
                  type: array
                  items:
                    type: string
                trackingId:
                  type: string
                secondaryIdentifiers:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      value:
                        type: string
            example:
              phoneNumber: '9789789780'
              templateTypes:
                - PFM_BANKS
                - PFM_BANKS
                - PFM_BANKS
                - PFM_BANKS
                - PFM_BANKS
              trackingId: a8a28aa2e284f7a0223765fc7860b03f648179a2dd8e2cf73bf31ddab8f31329
              secondaryIdentifiers:
                - type: PAN
                  value: ABCDE1234A
  /api/pfm/jfs_uat/web/refresh:
    post:
      summary: Refresh API
      responses: {}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                trackingId:
                  type: string
            example:
              trackingId: a8a28aa2e284f7a0223765fc7860b03f648179a2dd8e2cf73bf31ddab8f31329
  /api/pfm/jfs_uat/web/consent/revoke:
    post:
      summary: Revoke API
      parameters:
        - name: apiKey
          in: header
          schema:
            type: string
          example: '{{apiKey}}'
      responses: {}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                trackingId:
                  type: string
                referenceId:
                  type: string
            example:
              trackingId: a8a28aa2e284f7a0223765fc7860b03f648179a2dd8e2cf73bf31ddab8f31329
              referenceId: 090773bd-092e-44e1-a42a-76efa04a677d
  /api/pfm/jfs_uat/web/analyse:
    post:
      summary: Analyse
      parameters:
        - name: apiKey
          in: header
          schema:
            type: string
          example: '{{apiKey}}'
      responses: {}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                trackingId:
                  type: string
            example:
              trackingId: a8a28aa2e284f7a0223765fc7860b03f648179a2dd8e2cf73bf31ddab8f31329
  /api/pfm/jfs_uat/web/consents:
    get:
      summary: Get Consents
      parameters:
        - name: trackingId
          in: query
          schema:
            type: string
          example: a8a28aa2e284f7a0223765fc7860b03f648179a2dd8e2cf73bf31ddab8f31329
        - name: page
          in: query
          schema:
            type: integer
          example: 0
        - name: size
          in: query
          schema:
            type: integer
          example: 30
        - name: API_KEY
          in: header
          schema:
            type: string
          example: 222e861da2946d9d08e6b
      responses: {}
